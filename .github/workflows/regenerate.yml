name: Regenerate Plan

on:
  repository_dispatch:
    types: [chat_saved]
  workflow_dispatch:

# Grant GITHUB_TOKEN the permissions required
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install duckduckgo_search

      - name: Run generator
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: python generator.py

      - name: Commit generated files to main
        run: |
          git config user.name "Travel Planner Generator"
          git config user.email "generator@travel-planner.local"
          git add -A
          git diff --staged --quiet || (
            git commit -m "chore: regenerate plan" &&
            git pull --rebase &&
            git push
          )

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
