<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Chat 聊聊 — Travel Planner</title>
<link rel="stylesheet" href="templates/shared.css?v=2">
</head>
<body>
<nav>
  <a href="index.html">Today 今日</a>
  <a href="settings.html">Settings 設定</a>
  <a href="log.html">Log 日誌</a>
  <a href="chat.html" class="active">Chat 聊聊</a>
</nav>

<div class="container">
  <h2 class="section-title">💬 聊聊 Chat <span style="font-size:0.55rem;background:var(--gold);color:#000;padding:2px 6px;border-radius:3px;vertical-align:middle;font-family:monospace;">v250511.1</span></h2>
  <p class="section-sub">你在這裡寫下的修改建議，將在<strong>下一個整點</strong>自動套用，重新生成主頁。</p>
  <div class="chat-box">
    <div class="chat-date-label" id="date-label">📅 編輯計畫：...</div>
    <div style="background:rgba(201,168,76,0.08);border-radius:8px;padding:0.75rem 1rem;margin-bottom:1rem;font-size:0.85rem;line-height:1.6;">
      ⏱️ <strong>每小時自動檢查</strong>：若你修改了此內容並儲存，系統將在下一個整點（如 15:00、16:00...）自動重新生成主頁。<br>
      🏆 <strong>優先級</strong>：Chat 永遠優先於 Settings · 你在這裡寫的一切都會覆蓋設定頁的預設值。<br>
      🛡️ <strong>無修改不觸發</strong>：若內容未變，保留原計畫不動，不消耗 AI 額度。
    </div>
    <textarea id="chat-text" placeholder="跟 AI 說說你想怎麼改這份計畫...

例如：
- 前 3 天住 Le Narcisse Blanc，後 2 天換到香格里拉
- 第三天下午加一場 SPA
- 羅浮宮改去奧賽美術館
- 晚餐都要燭光晚餐，越浪漫越好
- 餐飲預算調高到 NT$ 25,000，購物調低
- 多安排甜點店跟咖啡館
- 第四天晚餐要在可以看到鐵塔的屋頂餐廳

你寫的內容會完整保留，AI 一次處理所有建議。（上限 2000 字）"></textarea>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:0.5rem;flex-wrap:wrap;gap:0.5rem;">
      <p class="chat-hint" style="margin-top:0;">✏️ 隨時回來編輯 · 下個整點自動套用 · 無修改不觸發 · 上限 2000 字</p>
      <span style="font-family:'Inter',sans-serif;font-size:0.7rem;color:var(--gold);" id="next-check">下次檢查：...</span>
    </div>
    <div style="font-size:0.7rem;margin-top:0.4rem;" id="token-status"></div>
    <button class="save-btn" style="margin-top:0.75rem;" onclick="saveChat()">💾 儲存修改 Save Notes</button>
  </div>
</div>

<script src="templates/shared.js"></script>
<script>
const REPO = 'mengtahsu/travel-planner';

function getTodayKey() {
  return new Date().toISOString().split('T')[0];
}

function getNextHour() {
  const now = new Date();
  now.setHours(now.getHours() + 1, 0, 0, 0);
  return now.toTimeString().slice(0,5);
}

async function loadChat() {
  const key = getTodayKey();
  document.getElementById('date-label').textContent = `📅 編輯計畫：${key}`;
  document.getElementById('next-check').textContent = `下次檢查：${getNextHour()}`;

  // Token status indicator
  const tok = localStorage.getItem('github_chat_token');
  const st = document.getElementById('token-status');
  if(tok) {
    st.innerHTML = '🟢 Token: ' + tok.substring(0,8) + '...' + tok.substring(tok.length-4) + ' (from localStorage)';
    st.style.color = '#4a9';
  } else {
    st.innerHTML = '🔴 尚未設定 Token — <a href="settings.html" style="color:var(--gold);">前往 Settings 設定</a>';
    st.style.color = '#e88';
  }

  // Load from localStorage first (instant, survives navigation)
  const saved = localStorage.getItem('chat_draft_' + key);
  if(saved) {
    document.getElementById('chat-text').value = saved;
  }

  // Then try to sync from GitHub
  try {
    const resp = await fetch(`data/chat/${key}.txt`);
    if(resp.ok) {
      const text = await resp.text();
      if(text && text !== saved) {
        document.getElementById('chat-text').value = text;
        localStorage.setItem('chat_draft_' + key, text);
      }
    }
  } catch(e) {
    // No chat yet on GitHub, use localStorage version
  }
}

function toBase64(str) {
  const bytes = new TextEncoder().encode(str);
  const binStr = Array.from(bytes, function(b) { return String.fromCharCode(b); }).join('');
  return btoa(binStr);
}

async function saveChat() {
  const key = getTodayKey();
  const text = document.getElementById('chat-text').value;

  // Always save to localStorage first — prevents data loss
  localStorage.setItem('chat_draft_' + key, text);

  const token = localStorage.getItem('github_chat_token');
  if(!token) {
    alert('⚠️ 已暫存到瀏覽器。\n\n請先在 Settings 頁面輸入 GitHub Token（需 repo 權限），即可跨裝置同步。');
    return;
  }

  // Diagnostic: show token prefix
  const tokPrefix = token.substring(0, 10) + '...' + token.substring(token.length - 4);

  const content = toBase64(text);
  const url = `https://api.github.com/repos/${REPO}/contents/data/chat/${key}.txt`;

  let sha = '';
  try {
    const resp = await fetch(url, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if(resp.ok) {
      const data = await resp.json(); sha = data.sha || '';
    } else if(resp.status === 401) {
      const body = await resp.text();
      alert('⚠️ Token 驗證失敗 (GET 401)。\n\n使用中 Token: ' + tokPrefix + '\nServer 回應: ' + body + '\n\n請到 Settings 頁面重新輸入 GitHub Token。\n\n已暫存到瀏覽器，不會遺失。');
      return;
    } else if(resp.status === 403) {
      const body = await resp.text();
      alert('⚠️ Token 無權限 (GET 403)。\n\n使用中 Token: ' + tokPrefix + '\nServer 回應: ' + body + '\n\n請確認 Token 有 repo 權限且已授權給 mengtahsu/travel-planner。\n\n已暫存到瀏覽器，不會遺失。');
      return;
    }
  } catch(e) {
    alert('⚠️ 網路錯誤 (GET): ' + e.message + '\n使用中 Token: ' + tokPrefix + '\n\n已暫存到瀏覽器。');
    return;
  }

  try {
    const resp = await fetch(url, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: `Update chat notes for ${key}`,
        content: content,
        sha: sha || undefined
      })
    });

    if(resp.ok) {
      alert('✅ 已儲存！將在 ' + getNextHour() + ' 自動套用修改。');
    } else {
      const body = await resp.text();
      if(resp.status === 401) {
        alert('⚠️ Token 驗證失敗 (PUT 401)。\n\n使用中 Token: ' + tokPrefix + '\nServer 回應: ' + body + '\n\n請到 Settings 頁面重新輸入 GitHub Token。\n\n已暫存到瀏覽器，不會遺失。');
      } else if(resp.status === 403) {
        alert('⚠️ Token 無權限 (PUT 403)。\n\n使用中 Token: ' + tokPrefix + '\nServer 回應: ' + body + '\n\n請確認 Token 有 Contents 寫入權限。\n\n已暫存到瀏覽器，不會遺失。');
      } else {
        alert('⚠️ 已暫存到瀏覽器，但 GitHub 寫入失敗 (' + resp.status + ')：' + body);
      }
    }
  } catch(e) {
    alert('⚠️ 已暫存到瀏覽器，但無法連接 GitHub。');
  }
}

// Auto-save to localStorage on every keystroke
document.addEventListener('DOMContentLoaded', function(){
  document.getElementById('chat-text').addEventListener('input', function(){
    var key = getTodayKey();
    localStorage.setItem('chat_draft_' + key, this.value);
  });
});

loadChat();
</script>
</body>
</html>
