<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Log 日誌 — Travel Planner</title>
<link rel="stylesheet" href="templates/shared.css?v=2">
</head>
<body>
<nav>
  <a href="index.html">Today 今日</a>
  <a href="settings.html">Settings 設定</a>
  <a href="log.html" class="active">Log 日誌</a>
  <a href="chat.html">Chat 聊聊</a>
</nav>

<div class="container">
  <h2 class="section-title">📋 研究日誌 Log <span style="font-size:0.55rem;background:var(--gold);color:#000;padding:2px 6px;border-radius:3px;vertical-align:middle;font-family:monospace;">v250511.2</span></h2>
  <p class="section-sub">查看每日 AI 生成進度與過往計畫記錄。</p>
  <div id="log-entries"></div>
</div>

<script src="templates/shared.js"></script>
<script>
async function loadLogs() {
  const container = document.getElementById('log-entries');
  let html = '';

  // 1. Load run history from runs.json (every generator execution)
  try {
    const resp = await fetch('data/runs.json');
    if(resp.ok) {
      const runs = await resp.json();
      if(runs.length > 0) {
        html += '<h3 style="margin-top:1rem;margin-bottom:0.5rem;color:var(--gold);">Run History</h3>';
        html += '<table style="width:100%;font-size:0.8rem;border-collapse:collapse;">';
        html += '<tr style="color:var(--warm-gray);border-bottom:1px solid rgba(255,255,255,0.1);"><th style="text-align:left;padding:4px 8px;">Time</th><th style="text-align:left;padding:4px 8px;">Status</th><th style="text-align:left;padding:4px 8px;">Destination</th><th style="text-align:left;padding:4px 8px;">Chat</th></tr>';
        for(const r of runs.slice(0, 50)) {
          const statusEmoji = r.status === 'skipped' ? '⏭️' : '✨';
          const statusLabel = r.status === 'skipped' ? 'Skipped' : 'Generated';
          const dest = r.destination || '-';
          const chat = r.chat_chars > 0 ? r.chat_chars + ' chars' : '-';
          html += `<tr style="border-bottom:1px solid rgba(255,255,255,0.05);">
            <td style="padding:4px 8px;">${r.ts}</td>
            <td style="padding:4px 8px;">${statusEmoji} ${statusLabel}</td>
            <td style="padding:4px 8px;">${dest}</td>
            <td style="padding:4px 8px;">${chat}</td>
          </tr>`;
        }
        html += '</table>';
      }
    }
  } catch(e) {}

  // 2. Load recent plan summaries (last 7 days, stop after 3 found)
  const today = new Date();
  let planCount = 0;
  let planHtml = '';

  for(let i = 0; i < 7 && planCount < 3; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = d.toISOString().split('T')[0];
    try {
      const resp = await fetch(`data/plans/${key}.json`);
      if(!resp.ok) continue;
      const plan = await resp.json();
      planCount++;

      const hasChat = plan.chat_hash && plan.chat_hash.length > 0;
      const statusText = hasChat ? 'Chat modified' : 'Auto generated';
      const days = typeof plan.days === 'string' ? plan.days : (plan.days + ' days');

      planHtml += `<div class="log-entry">
        <span class="log-date">${key}</span>
        <span class="log-status ${hasChat ? 'chatting' : 'generated'}">${statusText}</span>
        <p style="margin-top:0.4rem;font-size:0.85rem;">
          ${plan.destination_en || '?'} - ${plan.title_zh || ''}
          · ${days}
          · NT$${(plan.cost_total_ntd || 0).toLocaleString()}
          · ${plan.flight?.airline || ''}
        </p>
      </div>`;
    } catch(e) {
      // Skip missing/corrupt files
    }
  }

  if(planCount > 0) {
    html += '<h3 style="margin-top:1.5rem;margin-bottom:0.5rem;color:var(--gold);">Recent Plans</h3>';
    html += planHtml;
  }

  if(!html) {
    html = '<p style="color:var(--warm-gray);font-family:\'Noto Serif TC\',serif;">No records yet. Waiting for first run...</p>';
  }

  container.innerHTML = html;
}

loadLogs();
</script>
</body>
</html>
