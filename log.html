<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Log 日誌 — Travel Planner</title>
<link rel="stylesheet" href="templates/shared.css?v=3">
</head>
<body>
<nav>
  <a href="index.html">Today 今日</a>
  <a href="settings.html">Settings 設定</a>
  <a href="log.html" class="active">Log 日誌</a>
  <a href="chat.html">Chat 聊聊</a>
</nav>

<div class="container">
  <h2 class="section-title">📋 研究日誌 Log <span style="font-size:0.55rem;background:var(--gold);color:#000;padding:2px 6px;border-radius:3px;vertical-align:middle;font-family:monospace;">v250511.2</span></h2>
  <p class="section-sub">查看每日 AI 生成進度與過往計畫記錄。</p>
  <div id="log-entries"></div>
</div>

<script src="templates/shared.js"></script>
<script>
async function loadLogs() {
  const container = document.getElementById('log-entries');
  let html = '';

  // ═══ Section 1: Saved Plans ═══
  try {
    const resp = await fetch('data/saved/index.json');
    if(resp.ok) {
      const index = await resp.json();
      if(Array.isArray(index) && index.length > 0) {
        // Filter out locally-deleted entries (GitHub Pages may serve stale data)
        const deleted = JSON.parse(localStorage.getItem('deleted_saved') || '[]');
        const filtered = index.filter(function(e) { return deleted.indexOf(e.file) === -1; });
        if(filtered.length > 0) {
          html += '<h3 style="color:var(--gold);margin-bottom:0.5rem;">📁 Saved Plans</h3>';
          html += '<table style="width:100%;font-size:0.85rem;border-collapse:collapse;margin-bottom:1.5rem;">';
          for(const entry of filtered) {
            const url = 'data/saved/' + entry.file;
            const dest = entry.dest || '';
            const label = entry.title || entry.file.replace('.html','');
            const date = entry.date || '';
            html += '<tr style="border-bottom:1px solid rgba(255,255,255,0.05);">' +
              '<td style="padding:6px 10px;white-space:nowrap;font-family:monospace;font-size:0.78rem;">' + date + '</td>' +
              '<td style="padding:6px 10px;"><a href="' + url + '" target="_blank" style="color:var(--gold);text-decoration:none;">' + dest + ' — ' + label + '</a></td>' +
              '<td style="padding:6px 10px;"><button onclick="deleteSaved(\'' + entry.file + '\')" style="background:none;border:1px solid rgba(255,255,255,0.2);color:var(--warm-gray);cursor:pointer;font-size:0.7rem;padding:2px 8px;border-radius:4px;">✕</button></td>' +
            '</tr>';
          }
          html += '</table>';
        }
      }
  } catch(e) {}

  // ═══ Section 2: Run History ═══
  try {
    const resp = await fetch('data/runs.json');
    if(resp.ok) {
      const runs = await resp.json();
      if(runs.length > 0) {
        html += '<h3 style="color:var(--gold);margin-bottom:0.5rem;">📋 Run History</h3>';
        html += '<table style="width:100%;font-size:0.85rem;border-collapse:collapse;">';
        html += '<tr style="color:var(--warm-gray);border-bottom:1px solid rgba(255,255,255,0.1);"><th style="text-align:left;padding:6px 10px;">Time</th><th style="text-align:left;padding:6px 10px;">Plan</th><th style="text-align:left;padding:6px 10px;">Chat</th></tr>';
        for(const r of runs.slice(0, 100)) {
          const icon = r.status === 'skipped' ? '⏭️' : '✨';
          const desc = r.status === 'skipped' ? 'No changes — skipped' : (r.summary || r.destination || 'Generated');
          const chat = r.chat_chars > 0 ? r.chat_chars + ' chars' : '-';
          html += `<tr style="border-bottom:1px solid rgba(255,255,255,0.05);">
            <td style="padding:6px 10px;white-space:nowrap;font-family:monospace;font-size:0.8rem;">${r.ts}</td>
            <td style="padding:6px 10px;">${icon} ${desc}</td>
            <td style="padding:6px 10px;font-size:0.75rem;">${chat}</td>
          </tr>`;
        }
        html += '</table>';
      }
    }
  } catch(e) {}

  if(!html) {
    html = '<p style="color:var(--warm-gray);font-family:\'Noto Serif TC\',serif;">No records yet. Waiting for first run...</p>';
  }

  container.innerHTML = html;
}

async function deleteSaved(filename) {
  if(!confirm('Delete this saved plan?')) return;
  const btn = event.target;
  btn.textContent = '...';
  btn.disabled = true;
  const token = localStorage.getItem('github_chat_token');
  if(!token) { alert('No token'); return; }
  try {
    // 1. Delete the HTML file
    const r1 = await fetch('https://api.github.com/repos/mengtahsu/travel-planner/contents/data/saved/' + filename, {
      headers: {'Authorization': 'Bearer ' + token}
    });
    if(!r1.ok) throw new Error('File not found');
    const sha = (await r1.json()).sha;
    await fetch('https://api.github.com/repos/mengtahsu/travel-planner/contents/data/saved/' + filename, {
      method: 'DELETE',
      headers: {'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json'},
      body: JSON.stringify({message: 'Delete saved plan', sha: sha, branch: 'main'})
    });
    // 2. Update index.json — remove entry
    const r2 = await fetch('https://api.github.com/repos/mengtahsu/travel-planner/contents/data/saved/index.json', {
      headers: {'Authorization': 'Bearer ' + token}
    });
    if(r2.ok) {
      const raw = await r2.json();
      const bytes = Uint8Array.from(atob(raw.content), function(c) { return c.charCodeAt(0); });
      const index = JSON.parse(new TextDecoder().decode(bytes));
      const updated = index.filter(function(e) { return e.file !== filename; });
      const json = JSON.stringify(updated, null, 2);
      const enc = new TextEncoder().encode(json);
      const bin = Array.from(enc, function(b) { return String.fromCharCode(b); }).join('');
      await fetch('https://api.github.com/repos/mengtahsu/travel-planner/contents/data/saved/index.json', {
        method: 'PUT',
        headers: {'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json'},
        body: JSON.stringify({message: 'Remove from index', content: btoa(bin), sha: raw.sha, branch: 'main'})
      });
    }
    // 3. Remove row from DOM immediately (don't wait for Pages deploy)
    var row = btn.closest('tr');
    if(row) row.remove();
    // Also record deletion locally so reload won't show stale data
    var deleted = JSON.parse(localStorage.getItem('deleted_saved') || '[]');
    deleted.push(filename);
    localStorage.setItem('deleted_saved', JSON.stringify(deleted));
  } catch(e) {
    alert('Delete failed: ' + e.message);
    btn.textContent = '✕';
    btn.disabled = false;
  }
}

loadLogs();
</script>
</body>
</html>
