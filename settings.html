<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Settings 設定 — Travel Planner</title>
<link rel="stylesheet" href="templates/shared.css?v=3">
</head>
<body>
<nav>
  <a href="index.html">Today 今日</a>
  <a href="settings.html" class="active">Settings 設定</a>
  <a href="log.html">Log 日誌</a>
  <a href="chat.html">Chat 聊聊</a>
</nav>

<div class="container">
  <h2 class="section-title">⚙️ 設定 Settings <span style="font-size:0.55rem;background:var(--gold);color:#000;padding:2px 6px;border-radius:3px;vertical-align:middle;font-family:monospace;" id="version-badge">v250511.2</span></h2>
  <p class="section-sub">修改設定後，將在排程檢查時自動生效。</p>
  <div class="settings-grid">
    <div class="setting-group">
      <label>Year 年份</label>
      <select id="year"><option>2025</option><option>2026</option><option>2027</option><option>2028</option><option>2029</option><option>2030</option></select>
    </div>
    <div class="setting-group">
      <label>Month 月份</label>
      <select id="month">
        <option value="1">一月 January</option>
        <option value="2">二月 February</option>
        <option value="3">三月 March</option>
        <option value="4">四月 April</option>
        <option value="5" selected>五月 May</option>
        <option value="6">六月 June</option>
        <option value="7">七月 July</option>
        <option value="8">八月 August</option>
        <option value="9">九月 September</option>
        <option value="10">十月 October</option>
        <option value="11">十一月 November</option>
        <option value="12">十二月 December</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Travelers 旅客人數</label>
      <select id="travelers">
        <option value="1">1 人</option><option value="2" selected>2 人</option>
        <option value="3">3 人</option><option value="4">4 人</option>
        <option value="5">5 人</option><option value="6">6 人以上</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Trip Length 天數</label>
      <select id="days">
        <option value="3-4">3–4 天</option>
        <option value="4-5">4–5 天</option>
        <option value="5-6" selected>5–6 天</option>
        <option value="6-7">6–7 天</option>
        <option value="7-9">7–9 天</option>
        <option value="10-14">10–14 天</option>
        <option value="15-21">15–21 天</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Budget 預算 (NTD 新台幣)</label>
      <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap;">
        <input type="range" id="budget_ntd" min="50000" max="500000" step="10000" value="150000"
               style="flex:1;min-width:180px;accent-color:var(--gold);height:6px;"
               oninput="document.getElementById('budget_display').textContent = 'NT$ ' + Number(this.value).toLocaleString()">
        <span id="budget_display" style="font-family:'Inter',sans-serif;font-weight:700;color:var(--gold);min-width:100px;font-size:0.95rem;">NT$ 150,000</span>
      </div>
      <div class="zh-label" style="display:flex;justify-content:space-between;font-size:0.7rem;">
        <span>NT$ 50,000</span><span>NT$ 500,000</span>
      </div>
    </div>
    <div class="setting-group">
      <label>目的地 Destination（留空 = AI 推薦）</label>
      <input type="text" id="destination" placeholder="例如：Japan · Korea · 留空讓 AI 幫你選">
      <div class="zh-label">可填國家、城市、或留白</div>
    </div>
    <div class="setting-group">
      <label>出發地 Departure City</label>
      <select id="departure">
        <option value="Taiwan 台灣 (TPE)">台灣桃園 TPE</option>
        <option value="Taiwan 台灣 (TSA)">台北松山 TSA</option>
        <option value="Taiwan 台灣 (KHH)">高雄 KHH</option>
      </select>
      <div class="zh-label">選擇出發機場</div>
    </div>
    <div class="setting-group">
      <label>Chat Token（網頁寫回用）</label>
      <input type="password" id="chat_token" placeholder="Fine-grained GitHub token">
      <div class="zh-label">僅需 data/chat/ 目錄寫入權限的精細令牌</div>
    </div>
  </div>
  <p style="font-size:0.75rem;color:var(--warm-gray);margin-top:1.25rem;font-family:'Noto Serif TC',sans-serif;">
    <span id="save-status">⚡ 修改後自動儲存 · Auto-save on change</span>
  </p>
</div>

<script src="templates/shared.js"></script>
<script>
const REPO = 'mengtahsu/travel-planner';

async function loadSettings() {
  let loaded = false;

  // 1. Load from localStorage FIRST (instant, always reflects last save)
  const saved = localStorage.getItem('travel_settings');
  if(saved) {
    try {
      const data = JSON.parse(saved);
      setFormValues(data);
      loaded = true;
    } catch(e) {}
  }

  // Token only from localStorage, never from repo
  document.getElementById('chat_token').value = localStorage.getItem('github_chat_token') || '';

  // 2. Sync from GitHub API (authenticated — gets the REAL latest, not stale Pages CDN)
  const token = localStorage.getItem('github_chat_token');
  if(token) {
    try {
      const resp = await fetch(`https://api.github.com/repos/${REPO}/contents/config/settings.json`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if(resp.ok) {
        const raw = await resp.json();
        const bytes = Uint8Array.from(atob(raw.content), function(c) { return c.charCodeAt(0); });
        const data = JSON.parse(new TextDecoder().decode(bytes));
        setFormValues(data);
        localStorage.setItem('travel_settings', JSON.stringify(data));
        loaded = true;
      }
    } catch(e) {
      console.error('Failed to sync from GitHub API:', e);
    }
  }

  // 3. Fallback: try static file from Pages (may be stale but better than nothing)
  if(!loaded) {
    try {
      const resp = await fetch('config/settings.json');
      if(resp.ok) {
        const data = await resp.json();
        setFormValues(data);
        localStorage.setItem('travel_settings', JSON.stringify(data));
      }
    } catch(e) {}
  }

  function setFormValues(data) {
    document.getElementById('year').value = data.year || 2026;
    document.getElementById('month').value = data.month || 5;
    document.getElementById('travelers').value = data.travelers || 2;
    document.getElementById('days').value = data.days || '5-6';
    document.getElementById('budget_ntd').value = data.budget_ntd || 150000;
    document.getElementById('budget_display').textContent = 'NT$ ' + Number(data.budget_ntd || 150000).toLocaleString();
    document.getElementById('destination').value = data.destination || '';
    document.getElementById('departure').value = data.departure || 'Taiwan 台灣 (TPE)';
  }
}

function toBase64(str) {
  const bytes = new TextEncoder().encode(str);
  const binStr = Array.from(bytes, function(b) { return String.fromCharCode(b); }).join('');
  return btoa(binStr);
}

let autoSaveTimer = null;

function autoSave() {
  // Save to localStorage immediately
  const settings = {
    year: parseInt(document.getElementById('year').value),
    month: parseInt(document.getElementById('month').value),
    travelers: parseInt(document.getElementById('travelers').value),
    days: document.getElementById('days').value,
    budget_ntd: parseInt(document.getElementById('budget_ntd').value),
    destination: document.getElementById('destination').value,
    departure: document.getElementById('departure').value
  };
  localStorage.setItem('travel_settings', JSON.stringify(settings));

  // Save token if entered
  const tokenEl = document.getElementById('chat_token');
  if(tokenEl.value) {
    localStorage.setItem('github_chat_token', tokenEl.value);
  }

  // Debounce GitHub push (2 seconds after last change)
  clearTimeout(autoSaveTimer);
  document.getElementById('save-status').textContent = '⏳ Saving...';
  autoSaveTimer = setTimeout(async function() {
    const token = localStorage.getItem('github_chat_token');
    if(!token) {
      document.getElementById('save-status').textContent = '⚡ Saved locally · Set token to sync';
      return;
    }
    try {
      delete settings.chat_token;
      const json = JSON.stringify(settings, null, 2);
      const bytes = new TextEncoder().encode(json);
      const bin = Array.from(bytes, function(b) { return String.fromCharCode(b); }).join('');
      const content = btoa(bin);

      let sha = '';
      try {
        const r = await fetch(`https://api.github.com/repos/${REPO}/contents/config/settings.json`, {
          headers: {'Authorization': 'Bearer ' + token}
        });
        if(r.ok) sha = (await r.json()).sha || '';
      } catch(e) {}

      const r = await fetch(`https://api.github.com/repos/${REPO}/contents/config/settings.json`, {
        method: 'PUT',
        headers: {'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json'},
        body: JSON.stringify({message: 'Update settings', content: content, sha: sha || undefined, branch: 'main'})
      });
      document.getElementById('save-status').textContent = r.ok ? '✅ Saved to cloud' : '⚠️ Saved locally only';
    } catch(e) {
      document.getElementById('save-status').textContent = '⚠️ Saved locally only';
    }
  }, 2000);
}

// Attach auto-save to all inputs
document.querySelectorAll('.setting-group input, .setting-group select').forEach(function(el) {
  el.addEventListener('input', autoSave);
  el.addEventListener('change', autoSave);
});

loadSettings();
</script>
</body>
</html>
